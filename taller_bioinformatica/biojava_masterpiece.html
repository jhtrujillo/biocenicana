<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>BioJava GWAS | Brix</title>
    <script src='https://cdn.plot.ly/plotly-2.24.1.min.js'></script>
    <link href='https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap' rel='stylesheet'>
    <style>
        :root { --primary: #4f46e5; --secondary: #9333ea; --bg: #f1f5f9; --card: rgba(255, 255, 255, 0.7); --text: #0f172a; --text-dim: #64748b; }
        body { font-family: 'Outfit', sans-serif; margin: 0; background: var(--bg); color: var(--text); background-image: radial-gradient(circle at 50% -20%, #e0e7ff, var(--bg)); min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .header { padding: 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        h1 { margin: 0; font-weight: 700; letter-spacing: -0.02em; background: linear-gradient(to right, #4f46e5, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { padding: 40px; max-width: 1600px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 24px; text-align: center; transition: transform 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-val { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
        .main-grid { display: grid; grid-template-columns: 2.5fr 1fr; gap: 30px; margin-bottom: 30px; }
        .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--text); }
        .toggle-container { background: #eee; border-radius: 30px; padding: 5px; display: flex; gap: 5px; }
        .toggle-container button { border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; transition: 0.3s; background: transparent; }
        .toggle-container button.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }
        select, input { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1); color: var(--text); padding: 10px 16px; border-radius: 12px; font-family: inherit; outline: none; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: -8px; }
        th { text-align: left; padding: 16px; color: var(--text-dim); font-weight: 400; font-size: 0.85rem; }
        td { padding: 16px; background: rgba(255,255,255,0.5); border-top: 1px solid rgba(0,0,0,0.02); border-bottom: 1px solid rgba(0,0,0,0.02); }
        .badge { padding: 6px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; }
        .sig { background: #dcfce7; color: #15803d; }
        .non-sig { background: #f1f5f9; color: var(--text-dim); }
    </style>
</head>

    <div class='header'>
        <div><h1>Brix <span style='font-weight:300; font-size:1.2rem; opacity:0.6; color:var(--text)'>| GWAS Insight</span></h1></div>
        <div style='opacity: 0.8'><img src='https://www.cenicana.org/wp-content/uploads/2021/04/Logo-Cenicana-color.png' height='45'></div>

                </div>
                <div id='selBoxplot' style='height: 400px;'></div>
            </div>
        </div>
    </div>

        function renderTable() {
            const q = document.getElementById('search').value.toLowerCase();
            const size = parseInt(document.getElementById('pageSize').value);
            const filtered = top_hits.filter(h => h.id.toLowerCase().includes(q)).slice(0, size);
            document.getElementById('tableBody').innerHTML = filtered.map(h => `<tr onclick="showSelectionAnalysis('${h.id}')" style='cursor:pointer'>
                <td style='font-weight:600; color:var(--text)'>${h.id}</td><td>${h.chr}</td><td>${h.pos.toLocaleString()}</td>
                <td style='color:var(--text-dim)'>${h.model}</td><td style='font-family:monospace'>${h.eff.toFixed(4)}</td>
                <td style='font-weight:600; color:var(--secondary)'>${(h.r2 * 100).toFixed(1)}%</td>
                <td><span class='badge ${h.p < (0.05/ totalM) ? "sig" : "non-sig"}'>${h.p.toExponential(2)}</span></td>
            </tr>`).join('');
        }
        renderTable();

        function showView(view) {
            if (view === 'linear') {
                document.getElementById('manhattanPlot').style.display = 'block';
                document.getElementById('circularPlot').style.display = 'none';
                document.getElementById('btnLinear').classList.add('active');
                document.getElementById('btnCircular').classList.remove('active');
            } else {
                document.getElementById('manhattanPlot').style.display = 'none';
                document.getElementById('circularPlot').style.display = 'block';
                document.getElementById('btnLinear').classList.remove('active');
                document.getElementById('btnCircular').classList.add('active');
                renderCircular();
            }
        }

        function renderCircular() {
            const chroms = [...new Set(all_data.map(d => d.chr))].sort();
            const traces = chroms.map((c, idx) => {
                const cData = all_data.filter(d => d.chr === c);
                const maxPos = Math.max(...cData.map(d => d.x));
                const offset = (idx / chroms.length) * 360;
                const span = (1 / chroms.length) * 340;
                return {
                    type: 'scatterpolar', mode: 'markers',
                    r: cData.map(d => d.y),
                    theta: cData.map(d => offset + ((d.x % maxPos) / maxPos) * span),
                    text: cData.map(d => `${d.id}<br>P: ${d.y.toFixed(2)}`),
                    name: c, marker: { size: 4 }
                };
            });
            Plotly.newPlot('circularPlot', traces, {
                polar: { radialaxis: { title: '-log10(p)' }, angularaxis: { showticklabels: false } },
                margin: { t: 40, b: 40 }
            }, { responsive: true, displayModeBar: false });
        }

        function showSelectionAnalysis(markerId) {
            const h = top_hits.find(x => x.id === markerId);
            if (!h || !h.dist) return;

            document.getElementById('selectionAnalysis').style.display = 'block';
            document.getElementById('selMarkerName').innerText = h.id;
            
            const action = h.eff > 0 ? 'AUMENTAR' : 'DISMINUIR';
            const inverseAction = h.eff > 0 ? 'disminuir' : 'aumentar';
            const color = h.eff > 0 ? '#059669' : '#dc2626';
            
            document.getElementById('selMarkerStats').innerHTML = `
                <p><b>Cromosoma:</b> ${h.chr}</p>
                <p><b>Modelo:</b> ${h.model}</p>
                <p><b>Efecto por alelo ALT:</b> <span style='color:${color}; font-weight:bold'>${h.eff.toFixed(4)}</span></p>
                <p><b>Varianza Explicada (R²):</b> ${(h.r2*100).toFixed(2)}%</p>
                <div style='margin-top:20px; padding:15px; background:white; border-radius:12px; border-left:4px solid ${color}'>
                    <small style='color:var(--text-dim)'>GUÍA DE SELECCIÓN GENÓMICA</small><br>
                    <strong>El alelo ALT (Dosis) tiende a ${action.toLowerCase()} el rasgo.</strong><br><br>
                    <div style='font-size:13px;'>
                        • Si busca <b>${action}</b> el rasgo: Seleccione individuos con <b>Dosis 10</b>.<br>
                        • Si busca <b>${inverseAction.toUpperCase()}</b> el rasgo: Seleccione individuos con <b>Dosis 0</b>.
                    </div>
                </div>
                <div style='margin-top:20px;'>
                    <p><b>Candidatos Élite (Genotipo Ideal):</b></p>
                    <div id='eliteList' style='max-height:250px; overflow-y:auto; font-size:12px; background:white; padding:10px; border-radius:8px; border:1px solid rgba(0,0,0,0.05)'></div>
                </div>
            `;

            const getGenotype = (d, ref, alt) => {
                return alt.repeat(d) + ref.repeat(10 - d);
            };

            const bestDosage = h.eff > 0 ? 10 : 0;
            const eliteSamples = h.samples[bestDosage] || [];
            const geno = getGenotype(bestDosage, h.ref, h.alt);
            if (eliteSamples.length > 0) {
                let html = '<table style="width:100%; border-collapse:collapse; margin-top:10px">';
                html += '<tr style="background:rgba(0,0,0,0.02); font-weight:bold"><td>Individuo</td><td>Dosis</td><td>Genotipo</td></tr>';
                html += eliteSamples.map(s => `<tr><td style="padding:4px">${s}</td><td>${bestDosage}</td><td style="font-family:monospace; color:var(--primary)">${geno}</td></tr>`).join('');
                html += '</table>';

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioJava | SNP Phylogeny Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #f1f5f9; --white: #ffffff; --border: #e2e8f0;
    --text: #1e293b; --muted: #64748b; --accent: #2563eb;
    --accent-bg: #eff6ff; --node-leaf: #3b82f6;
    --node-int: #94a3b8; --link: #cbd5e1; --danger: #ef4444;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.nav { display:flex; align-items:center; justify-content:space-between; padding:0.6rem 1.2rem; background:white; border-bottom:1px solid var(--border); flex-shrink:0; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.nav-brand { display:flex; align-items:center; gap:0.6rem; }
.nav-icon { width:30px;height:30px; border-radius:7px; background:linear-gradient(135deg,#2563eb,#7c3aed); color:white; display:flex;align-items:center;justify-content:center; font-weight:700;font-size:13px; }
.nav-title { font-size:.95rem; font-weight:600; }
.nav-title span { color:var(--muted); font-weight:400; }
.btn-export { display:flex;align-items:center;gap:.35rem; padding:.45rem .9rem; background:var(--accent);color:white;border:none;border-radius:7px;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s; }
.btn-export:hover { background:#1d4ed8; }
.body { display:flex; flex:1; overflow:hidden; }
.sidebar { width:260px; background:white; border-right:1px solid var(--border); padding:.8rem; display:flex;flex-direction:column;gap:.7rem;overflow-y:auto;flex-shrink:0; }
.viz { flex:1; position:relative; overflow:hidden; background:#f8fafc; cursor:grab; }
.viz:active { cursor:grabbing; }
.viz svg { position:absolute;top:0;left:0;width:100%;height:100%; }
.viz::before { content:""; position:absolute;inset:0; background-image:radial-gradient(circle,#cbd5e1 1px,transparent 1px); background-size:28px 28px; opacity:.45; pointer-events:none; z-index:0; }
.panel { background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:.8rem; }
.panel-title { font-size:.68rem; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:.6rem; }
.layout-grid { display:grid; grid-template-columns:1fr 1fr; gap:.35rem; }
.btn-mode { padding:.45rem .3rem; border:1px solid var(--border); border-radius:6px; background:white; color:var(--text); font-size:.73rem; font-weight:500; cursor:pointer; transition:all .2s; text-align:center; line-height:1.3; }
.btn-mode:hover { border-color:var(--accent); color:var(--accent); }
.btn-mode.active { background:var(--accent); color:white; border-color:var(--accent); }
.search { width:100%; padding:.5rem .65rem; border:1px solid var(--border); border-radius:6px; font-size:.83rem; outline:none; background:white; transition:.2s; }
.search:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
.clust-row { display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem; }
.clust-label { font-size:.78rem; color:var(--muted); }
.clust-val { font-size:.75rem; font-weight:600; color:var(--accent); background:var(--accent-bg); padding:.1rem .4rem; border-radius:4px; }
input[type=range] { width:100%; accent-color:var(--accent); }
.btn-clear { margin-top:.4rem; width:100%; padding:.4rem; border:1px solid var(--border); border-radius:6px; background:white; color:var(--muted); font-size:.78rem; cursor:pointer; transition:.2s; }
.btn-clear:hover { border-color:var(--danger); color:var(--danger); }
.stat-row { display:flex;justify-content:space-between;align-items:center;padding:.3rem 0;border-bottom:1px solid var(--border); }
.stat-row:last-child { border-bottom:none; }
.stat-k { font-size:.78rem; color:var(--muted); }
.stat-v { font-size:.8rem; font-weight:600; }
.leg-item { display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--muted);margin-bottom:.25rem; }
.leg-dot { width:9px;height:9px;border-radius:50%;flex-shrink:0; }
#tooltip { position:fixed; background:white; border:1px solid var(--border); border-radius:8px; padding:.55rem .8rem; font-size:.8rem; box-shadow:0 4px 12px rgba(0,0,0,.1); pointer-events:none; opacity:0; transition:opacity .15s; z-index:999; max-width:300px; }
#tooltip.show { opacity:1; }
.tt-name { font-weight:600; margin-bottom:.2rem; }
.tt-info { color:var(--muted); font-size:.74rem; }
</style>
</head>
<body>
<nav class="nav">
    <div class="nav-brand">
        <div class="nav-icon">B</div>
        <div class="nav-title">BioJava <span>| SNP Neighbor-Joining Tree</span></div>
    </div>
    <button class="btn-export" onclick="exportSVG()">&#8659; Export SVG</button>
</nav>
<div class="body">
    <aside class="sidebar">
        <div class="panel">
            <div class="panel-title">&#9708; Layout</div>
            <div class="layout-grid">
                <button class="btn-mode active" id="btn-rect"         onclick="setMode('rect')">Rect.<br>Cladogram</button>
                <button class="btn-mode"        id="btn-phylo"        onclick="setMode('phylo')">Rect.<br>Phylogram</button>
                <button class="btn-mode"        id="btn-radial"       onclick="setMode('radial')">Radial<br>Cladogram</button>
                <button class="btn-mode"        id="btn-radial-phylo" onclick="setMode('radial-phylo')">Radial<br>Phylogram</button>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title">&#9740; Search Sample</div>
            <input class="search" id="search-input" type="text" placeholder="Type name..." oninput="onSearch()">
        </div>
        <div class="panel">
            <div class="panel-title">&#9741; Genetic Clustering</div>
            <div class="clust-row">
                <span class="clust-label">Distance Threshold</span>
                <span class="clust-val" id="dist-val">off</span>
            </div>
            <input type="range" id="cluster-slider" min="0" max="100" value="0" oninput="onCluster()">
            <button class="btn-clear" onclick="clearClusters()">Clear Clusters</button>
        </div>
        <div class="panel" id="pca-panel" style="display:none">
            <div class="panel-title">&#9633; Color by PCA Cluster</div>
            <div class="clust-row" style="margin-bottom:.6rem;">
                <span class="clust-label">Method</span>
            </div>
            <div class="layout-grid">
                <button class="btn-mode" id="btn-kmeans"  onclick="setPcaMode('kmeans')">K-Means</button>
                <button class="btn-mode" id="btn-dbscan"  onclick="setPcaMode('dbscan')">DBSCAN</button>
                <button class="btn-mode" id="btn-gmm"     onclick="setPcaMode('gmm')">GMM</button>
                <button class="btn-mode" id="btn-pca-off" onclick="setPcaMode('off')">Off</button>
            </div>
            <div id="pca-legend" style="margin-top:.6rem;"></div>
        </div>
        <div class="panel">
            <div class="panel-title">&#9997; Statistics</div>
            <div id="stats-content"></div>
        </div>
        <div class="panel">
            <div class="panel-title">&#9679; Legend</div>
            <div class="leg-item"><div class="leg-dot" style="background:#3b82f6"></div>Leaf node (taxon)</div>
            <div class="leg-item"><div class="leg-dot" style="background:#94a3b8"></div>Internal node</div>
            <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div>Search match</div>
        </div>
    </aside>
    <div class="viz" id="viz">
        <svg id="main-svg" xmlns="http://www.w3.org/2000/svg"><g id="root-g"></g></svg>
    </div>
</div>
<div id="tooltip"><div class="tt-name" id="tt-name"></div><div class="tt-info" id="tt-info"></div></div>
<script>
function parseNewick(s) {
    const stack = [];
    let node = { children: [] };
    const tokens = s.match(/([(),;:]|[^(),;:\s]+)/g) || [];
    for (let i = 0; i < tokens.length; i++) {
        const t = tokens[i];
        if (t === '(') { const c = { children: [] }; node.children.push(c); stack.push(node); node = c; }
        else if (t === ',') { const c = { children: [] }; stack[stack.length-1].children.push(c); node = c; }
        else if (t === ')') { node = stack.pop(); }
        else if (t === ':') { node.branchLength = parseFloat(tokens[++i]); }
        else if (t !== ';') { node.name = t.replace(/['"]/g,''); }
    }
    return node;
}

function buildTree(data, parent, depth) {
    depth = depth || 0;
    const node = { data, parent: parent || null, depth, children: [],
        cumDist: (parent ? parent.cumDist : 0) + (data.branchLength || 0),
        x:0, y:0, color:null };
    if (data.children && data.children.length)
        node.children = data.children.map(c => buildTree(c, node, depth+1));
    return node;
}
function allNodes(n) { const o=[n]; for(const c of n.children) o.push(...allNodes(c)); return o; }
function getLeaves(n) { return allNodes(n).filter(x=>!x.children.length); }

function layoutCluster(root, W, H) {
    const lv = getLeaves(root), n = lv.length;
    const step = H / (n + 1);
    lv.forEach((l, i) => { l.x = step * (i+1); });
    function ax(nd) { if(!nd.children.length) return; nd.children.forEach(ax); nd.x=(nd.children[0].x+nd.children[nd.children.length-1].x)/2; }
    ax(root);
    const maxD = Math.max(...allNodes(root).map(nd=>nd.depth), 1);
    allNodes(root).forEach(nd => { nd.y = (nd.depth/maxD)*W; });
}

function layoutPhylo(root, W, H) {
    layoutCluster(root, W, H);
    const maxC = Math.max(...allNodes(root).map(nd=>nd.cumDist), 0.0001);
    allNodes(root).forEach(nd => { nd.y = (nd.cumDist/maxC)*W; });
}

const vizDiv = document.getElementById('viz');
const svgEl  = document.getElementById('main-svg');
const rootG  = document.getElementById('root-g');
const tooltip = document.getElementById('tooltip');
let mode='rect', searchQ='', treeRoot=null;
let vx=0, vy=0, vscale=1, dragging=false, lmx=0, lmy=0;

vizDiv.addEventListener('mousedown', e => { dragging=true; lmx=e.clientX; lmy=e.clientY; });
window.addEventListener('mouseup', () => { dragging=false; });
window.addEventListener('mousemove', e => {
    if(!dragging) return;
    vx+=e.clientX-lmx; vy+=e.clientY-lmy; lmx=e.clientX; lmy=e.clientY;
    rootG.setAttribute('transform', `translate(${vx},${vy}) scale(${vscale})`);
});
vizDiv.addEventListener('wheel', e => {
    e.preventDefault();
    const r=vizDiv.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
    const f=e.deltaY<0?1.12:1/1.12;
    vx=mx-f*(mx-vx); vy=my-f*(my-vy); vscale*=f;
    rootG.setAttribute('transform', `translate(${vx},${vy}) scale(${vscale})`);
}, {passive:false});

function mkSVG(tag, attrs) {
    const el=document.createElementNS('http://www.w3.org/2000/svg', tag);
    for(const [k,v] of Object.entries(attrs||{})) el.setAttribute(k,v);
    return el;
}

function linkH(px,py,cx,cy) { return `M${py},${px} H${cy} V${cx}`; }
function linkR(pa,pr,ca,cr) {
    const x1=pr*Math.cos(pa-Math.PI/2), y1=pr*Math.sin(pa-Math.PI/2);
    const x2=cr*Math.cos(pa-Math.PI/2), y2=cr*Math.sin(pa-Math.PI/2);
    const x3=cr*Math.cos(ca-Math.PI/2), y3=cr*Math.sin(ca-Math.PI/2);
    const large=Math.abs(ca-pa)>Math.PI?1:0, sweep=ca>pa?1:0;
    return `M${x1},${y1} L${x2},${y2} A${cr},${cr} 0 ${large},${sweep} ${x3},${y3}`;
}

function hsl(i) { return `hsl(${(i*137.508)%360},65%,52%)`; }

function render() {
    while(rootG.firstChild) rootG.removeChild(rootG.firstChild);
    const W=vizDiv.clientWidth, H=vizDiv.clientHeight;
    const isR=mode.includes('radial'), isP=mode.includes('phylo');
    const MARGIN=150;
    const nodes=allNodes(treeRoot), lv=getLeaves(treeRoot);
    const maxC=Math.max(...nodes.map(n=>n.cumDist),0.0001);

    if(isR) {
        const radius=Math.min(W,H)/2-MARGIN;
        lv.forEach((l,i)=>{ l._a=(2*Math.PI*i)/lv.length; });
        function aa(nd){ if(!nd.children.length) return; nd.children.forEach(aa); nd._a=(nd.children[0]._a+nd.children[nd.children.length-1]._a)/2; }
        aa(treeRoot); treeRoot._a=treeRoot._a||0;
        const maxD=Math.max(...nodes.map(n=>n.depth),1);
        nodes.forEach(n=>{ n._r=isP?(n.cumDist/maxC)*radius:(n.depth/maxD)*radius; });
        vx=W/2; vy=H/2; vscale=1;
        rootG.setAttribute('transform',`translate(${vx},${vy}) scale(${vscale})`);
        const lg=mkSVG('g');
        nodes.forEach(n=>{ if(!n.parent) return;
            lg.appendChild(mkSVG('path',{d:linkR(n.parent._a,n.parent._r,n._a,n._r),fill:'none',stroke:n.color||'#cbd5e1','stroke-width':n.color?'2':'1.2'}));
        });
        rootG.appendChild(lg);
        nodes.forEach(n=>{
            const nx=n._r*Math.cos(n._a-Math.PI/2), ny=n._r*Math.sin(n._a-Math.PI/2);
            const g=mkSVG('g',{transform:`translate(${nx},${ny})`});
            const isLeaf=!n.children.length;
            const isMatch=searchQ&&n.data.name&&n.data.name.toLowerCase().includes(searchQ);
            const pcaCol=getPcaColor(n.data.name); const fill=pcaCol||(n.color||(isMatch?'#ef4444':isLeaf?'#3b82f6':'#94a3b8'));
            g.appendChild(mkSVG('circle',{r:isLeaf?4:2.5,fill,stroke:'white','stroke-width':'1.5'}));
            if(isLeaf&&n.data.name){
                const deg=(n._a*180/Math.PI)-90, flip=deg>90||deg<-90;
                const tx=mkSVG('text',{dy:'0.31em',x:flip?-8:8,'text-anchor':flip?'end':'start',transform:flip?'rotate(180)':'',style:`font-size:10px;fill:${isMatch?'#ef4444':'#1e293b'};font-family:system-ui`});
                tx.textContent=n.data.name; g.appendChild(tx);
            }
            g.style.cursor='pointer';
            g.addEventListener('mouseenter',e=>showTT(e,n));
            g.addEventListener('mouseleave',hideTT);
            rootG.appendChild(g);
        });
    } else {
        const tW=W-MARGIN-40, tH=Math.max(H-60, lv.length*14);
        if(isP) layoutPhylo(treeRoot,tW,tH); else layoutCluster(treeRoot,tW,tH);
        vx=50; vy=20; vscale=1;
        rootG.setAttribute('transform',`translate(${vx},${vy}) scale(${vscale})`);
        const lg=mkSVG('g');
        nodes.forEach(n=>{ if(!n.parent) return;
            lg.appendChild(mkSVG('path',{d:linkH(n.parent.x,n.parent.y,n.x,n.y),fill:'none',stroke:n.color||'#cbd5e1','stroke-width':n.color?'2':'1.2'}));
        });
        rootG.appendChild(lg);
        nodes.forEach(n=>{
            const g=mkSVG('g',{transform:`translate(${n.y},${n.x})`});
            const isLeaf=!n.children.length;
            const isMatch=searchQ&&n.data.name&&n.data.name.toLowerCase().includes(searchQ);
            const pcaCol=getPcaColor(n.data.name); const fill=pcaCol||(n.color||(isMatch?'#ef4444':isLeaf?'#3b82f6':'#94a3b8'));
            g.appendChild(mkSVG('circle',{r:isLeaf?4:2.5,fill,stroke:'white','stroke-width':'1.5'}));
            if(n.data.name){
                const tx=mkSVG('text',{dy:'0.31em',x:isLeaf?8:-8,'text-anchor':isLeaf?'start':'end',style:`font-size:10px;fill:${isMatch?'#ef4444':'#1e293b'};font-family:system-ui`});
                tx.textContent=n.data.name; g.appendChild(tx);
            }
            g.style.cursor='pointer';
            g.addEventListener('mouseenter',e=>showTT(e,n));
            g.addEventListener('mouseleave',hideTT);
            rootG.appendChild(g);
        });
    }
}

function showTT(e,n){
    const name=n.data.name||(n.children.length?'Internal Node':'?');
    const bl=n.data.branchLength!=null?n.data.branchLength.toFixed(6):'N/A';
    document.getElementById('tt-name').textContent=name;
    document.getElementById('tt-info').innerHTML=`Branch: ${bl} &nbsp;|&nbsp; Cum: ${n.cumDist.toFixed(6)}`;
    tooltip.classList.add('show'); moveTT(e);
}
function hideTT(){tooltip.classList.remove('show');}
document.addEventListener('mousemove',moveTT);
function moveTT(e){
    if(!tooltip.classList.contains('show')) return;
    let x=e.clientX+14, y=e.clientY+14;
    if(x+280>window.innerWidth) x=e.clientX-290;
    if(y+80>window.innerHeight) y=e.clientY-90;
    tooltip.style.left=x+'px'; tooltip.style.top=y+'px';
}

function setMode(m){
    mode=m;
    document.querySelectorAll('.btn-mode').forEach(b=>b.classList.remove('active'));
    document.getElementById('btn-'+m).classList.add('active');
    render();
}

function onSearch(){ searchQ=document.getElementById('search-input').value.trim().toLowerCase(); render(); }

function onCluster(){
    const pct=+document.getElementById('cluster-slider').value;
    const nodes=allNodes(treeRoot);
    const maxC=Math.max(...nodes.map(n=>n.cumDist),0.0001);
    const thr=(pct/100)*maxC;
    document.getElementById('dist-val').textContent=pct===0?'off':thr.toFixed(4);
    nodes.forEach(n=>{n.color=null;});
    if(pct>0){
        let idx=0;
        nodes.forEach(n=>{
            if(n.parent&&!n.parent.color&&n.cumDist>=thr){
                const col=hsl(idx++); allNodes(n).forEach(c=>{c.color=col;});
            }
        });
    }
    render();
}

function clearClusters(){ document.getElementById('cluster-slider').value=0; onCluster(); }

function exportSVG(){
    const s=new XMLSerializer(); let src=s.serializeToString(svgEl);
    src=src.replace('<svg ','<svg xmlns="http://www.w3.org/2000/svg" ');
    src=src.replace(/(<svg[^>]*>)/,'$1<rect width="100%" height="100%" fill="#f8fafc"/>');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([src],{type:'image/svg+xml'}));
    a.download='biojava_phylogeny.svg'; a.click();
}

function renderStats(){
    const nodes=allNodes(treeRoot), lv=getLeaves(treeRoot);
    const maxD=Math.max(...nodes.map(n=>n.depth));
    const maxC=Math.max(...nodes.map(n=>n.cumDist));
    document.getElementById('stats-content').innerHTML=`
        <div class="stat-row"><span class="stat-k">Total Nodes</span><span class="stat-v">${nodes.length}</span></div>
        <div class="stat-row"><span class="stat-k">Leaves (Taxa)</span><span class="stat-v">${lv.length}</span></div>
        <div class="stat-row"><span class="stat-k">Max Depth</span><span class="stat-v">${maxD}</span></div>
        <div class="stat-row"><span class="stat-k">Max Cum. Dist.</span><span class="stat-v">${maxC.toFixed(5)}</span></div>`;
}

const NEWICK = "/*NEWICK_DATA*/";

// ===== PCA CLUSTER DATA =====
const PCA_DATA = /*PCA_DATA*/;
let pcaMode = 'off';

function initPcaPanel() {
    if (PCA_DATA && typeof PCA_DATA === 'object') {
        document.getElementById('pca-panel').style.display = 'block';
    }
}

function setPcaMode(m) {
    pcaMode = m;
    document.querySelectorAll('#pca-panel .btn-mode').forEach(b => b.classList.remove('active'));
    if (m !== 'off') document.getElementById('btn-' + m).classList.add('active');
    else document.getElementById('btn-pca-off').classList.add('active');
    renderPcaLegend();
    render();
}

function getPcaColor(sampleName) {
    if (!PCA_DATA || pcaMode === 'off' || !sampleName) return null;
    const entry = PCA_DATA[sampleName];
    if (!entry) return null;
    const clusterKey = pcaMode; // 'kmeans','dbscan','gmm'
    const val = entry[clusterKey];
    if (!val || val === '?' || val.toLowerCase() === 'noise') return '#aaaaaa';
    return hsl(parseInt(val, 10));
}

function renderPcaLegend() {
    const legend = document.getElementById('pca-legend');
    if (!PCA_DATA || pcaMode === 'off') { legend.innerHTML = ''; return; }
    const seen = new Map();
    Object.values(PCA_DATA).forEach(e => {
        const v = e[pcaMode];
        if (!seen.has(v)) seen.set(v, v.toLowerCase() === 'noise' ? '#aaaaaa' : hsl(parseInt(v,10)));
    });
    const sorted = [...seen.entries()].sort((a,b)=>a[0].localeCompare(b[0],undefined,{numeric:true}));
    legend.innerHTML = sorted.map(([k,col]) =>
        `<div class="leg-item"><div class="leg-dot" style="background:${col}"></div>Cluster ${k}</div>`
    ).join('');
}

treeRoot = buildTree(parseNewick(NEWICK));
initPcaPanel();
renderStats();
render();
window.addEventListener('resize', render);
</script>
</body>
</html>
